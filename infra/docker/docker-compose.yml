name: codesage-dev

services:

  # ── Weaviate vector database ─────────────────────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.26.1
    container_name: codesage-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"   # gRPC
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none   # we supply our own vectors
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (feedback store) ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codesage-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer — lightweight DB UI (dev only) ────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: codesage-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  weaviate_data:
  postgres_data:

# ── Usage ──────────────────────────────────────────────────────────────────────
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v   (⚠ wipes all data)
# Logs:    docker compose logs -f weaviate
# DB UI:   http://localhost:8888  (server: postgres, user/pass from infra/docker/.env)
# Postgres exposed on localhost:5433 to avoid conflicts with local PostgreSQL installs
# Weaviate: http://localhost:8080/v1/.well-known/ready
